name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to download Chromium from (leave empty for latest release or current tag)'
        required: false
        default: ''
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Download chromium binary from release
        uses: robinraju/release-downloader@v1
        with:
          latest: ${{ github.event.inputs.tag == '' && github.ref_type != 'tag' }}
          tag: ${{ github.event.inputs.tag || (github.ref_type == 'tag' && github.ref_name || '') }}
          fileName: 'ungoogled-chromium-*_linux.tar.gz'
          out-file-path: .
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chromium-manager:${{ github.event.inputs.tag || github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/chromium-manager:latest
