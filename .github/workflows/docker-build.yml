name: Build and Push Docker Image

on:
  push:
    branches:
      - main # 如果你的默认分支是 master，请改为 master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 模拟 ARM64 环境（因为 GitHub 默认服务器是 AMD64 架构）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. 设置 Docker 构建器
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 核心步骤：直接在云端下载 ARM64 的浏览器包
      - name: Download Ungoogled Chromium (ARM64)
        run: |
          wget https://github.com/ungoogled-software/ungoogled-chromium-portablelinux/releases/download/148.0.7778.96-1/ungoogled-chromium-148.0.7778.96-1-arm64_linux.tar.xz

      # 4. 登录到 GitHub 镜像仓库
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. 构建并推送镜像
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chromium-manager:latest
          build-args: |
            TARGETARCH=arm64
