name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ 关键改动：在 CI 宿主机（AMD64）上完成下载 + 解压
      # 宿主机原生支持 xz，完全绕开 QEMU 环境的兼容性问题
      - name: Download and Extract Ungoogled Chromium (ARM64)
        run: |
          wget -q https://github.com/ungoogled-software/ungoogled-chromium-portablelinux/releases/download/148.0.7778.96-1/ungoogled-chromium-148.0.7778.96-1-arm64_linux.tar.xz
          mkdir -p chromium-bin
          tar xf ungoogled-chromium-148.0.7778.96-1-arm64_linux.tar.xz \
            --strip-components=1 \
            -C chromium-bin
          rm ungoogled-chromium-148.0.7778.96-1-arm64_linux.tar.xz

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chromium-manager:latest
